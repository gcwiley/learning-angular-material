<mat-sidenav-container class="sidenav-container">
   <mat-sidenav
      #drawer
      class="sidenav"
      fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
      <mat-toolbar>Menu</mat-toolbar>
      <mat-nav-list>
         <a mat-list-item href="/">Home</a>
         <a mat-list-item href="create-album">New Album</a>
         <a mat-list-item href="create-hero">New Hero</a>
      </mat-nav-list>
   </mat-sidenav>
   <mat-sidenav-content>
      <mat-toolbar class="toolbar">
         <!-- fix this! -->
         <button
            type="button"
            aria-label="Toggle sidenav"
            mat-icon-button
            (click)="drawer.toggle()"
            *ngIf="isHandset$ | async">
            <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
         </button>
         <!-- title -->
         <span>Admin Dashboard</span>

         <!-- button -->
      </mat-toolbar>
      <mat-tab-group>
         <mat-tab label="Album List">
            <app-album-table></app-album-table>
         </mat-tab>
         <mat-tab label="Hero List">
            <app-hero-table></app-hero-table>
         </mat-tab>
      </mat-tab-group>
   </mat-sidenav-content>
</mat-sidenav-container>
